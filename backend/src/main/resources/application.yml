spring:
  application:
    name: finance-tracker

  datasource:
    url: jdbc:postgresql://localhost:5432/finance_tracker
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - email
              - profile
              - https://www.googleapis.com/auth/gmail.readonly
            redirect-uri: "{baseUrl}/api/auth/google/callback"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo

app:
  jwt:
    secret: ${JWT_SECRET} # 32+ char secret
    expiration-ms: 604800000 # 7 days

  gemini:
    api-key: ${GEMINI_API_KEY}
    api-url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent

  frontend-url: http://localhost:5173

  gmail:
    bank-senders: alerts@hdfcbank.net,alerts@icicibank.com,alerts@axisbank.com,noreply@kotakbank.com,alerts@sbicard.com,info@indusind.com,do_not_reply@yesbank.in

server:
  port: 8080

logging:
  level:
    com.fintrack: DEBUG
    org.springframework.security: INFO
